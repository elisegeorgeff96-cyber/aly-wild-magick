<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aly Casts Wild Magick</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --deep: #0a0415;
    --void: #110824;
    --good: #a8e6cf;
    --good-glow: #4ecdc4;
    --bad: #ff6b9d;
    --bad-glow: #c0392b;
    --neutral: #c3a6ff;
    --neutral-glow: #9b59b6;
    --legendary: #ffd700;
    --legendary-glow: #ff8c00;
    --stardust: rgba(255,255,255,0.05);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Crimson Pro', Georgia, serif;
    overflow: hidden;
    position: relative;
  }

  /* Starfield */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--dur) ease-in-out infinite var(--delay);
  }
  @keyframes twinkle {
    0%, 100% { opacity: var(--min-op); transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  /* Floating runes */
  .runes {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .rune {
    position: absolute;
    font-size: clamp(1rem, 2vw, 1.8rem);
    opacity: 0.07;
    animation: floatRune var(--rdur) ease-in-out infinite var(--rdelay);
    color: var(--neutral);
  }
  @keyframes floatRune {
    0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.05; }
    50% { transform: translateY(-20px) rotate(10deg); opacity: 0.12; }
  }

  /* Main layout */
  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
    max-width: 800px;
    width: 100%;
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.2rem, 3.5vw, 2.6rem);
    font-weight: 900;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 50%, #e0c3fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    margin-bottom: 0.4rem;
    line-height: 1.3;
  }

  .subtitle {
    font-size: 1rem;
    color: rgba(195, 166, 255, 0.5);
    font-style: italic;
    margin-bottom: 3rem;
    letter-spacing: 0.1em;
  }

  /* THE BUTTON */
  .magick-btn {
    position: relative;
    background: none;
    border: none;
    cursor: pointer;
    outline: none;
    padding: 0;
    margin-bottom: 3rem;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  .btn-inner {
    position: relative;
    padding: 1.2rem 3rem;
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(0.9rem, 2vw, 1.3rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--deep);
    background: linear-gradient(135deg, #c3a6ff, #8ec5fc, #a8e6cf);
    border-radius: 4px;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    transition: all 0.2s ease;
    text-shadow: none;
    box-shadow:
      0 0 30px rgba(195, 166, 255, 0.3),
      0 0 60px rgba(195, 166, 255, 0.1),
      inset 0 1px 0 rgba(255,255,255,0.4);
  }

  /* Orbiting particles around button */
  .orbit {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    animation: orbitSpin 8s linear infinite;
    pointer-events: none;
  }
  .orbit::before, .orbit::after {
    content: '✦';
    position: absolute;
    font-size: 0.8rem;
    color: var(--neutral);
    opacity: 0.6;
  }
  .orbit::before { top: 0; left: 50%; transform: translateX(-50%); }
  .orbit::after { bottom: 0; right: 10%; }
  @keyframes orbitSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .magick-btn:hover .btn-inner {
    transform: scale(1.05);
    box-shadow:
      0 0 50px rgba(195, 166, 255, 0.6),
      0 0 100px rgba(195, 166, 255, 0.2);
  }
  .magick-btn:active .btn-inner {
    transform: scale(0.97);
  }

  /* Result card - jade green opaque */
  .result-card {
    position: relative;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 3rem;
    border-radius: 12px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    background: #1a3d2b;
    border: 2px solid #2d6e4a;
    box-shadow: 0 0 40px rgba(30,90,55,0.5), 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(100,200,130,0.15);
  }

  .result-card.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* Ivy corner decorations */
  .ivy-corner {
    position: absolute;
    width: 70px;
    height: 70px;
    pointer-events: none;
    opacity: 0.75;
  }
  .ivy-tl { top: -2px; left: -2px; }
  .ivy-tr { top: -2px; right: -2px; transform: scaleX(-1); }
  .ivy-bl { bottom: -2px; left: -2px; transform: scaleY(-1); }
  .ivy-br { bottom: -2px; right: -2px; transform: scale(-1); }

  .result-type {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    opacity: 0.9;
    color: #7ecfa0;
  }

  .result-text {
    font-size: clamp(1rem, 2.5vw, 1.35rem);
    line-height: 1.7;
    font-style: italic;
    max-width: 600px;
    text-align: center;
    color: #e8f5ee;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }

  .result-emoji {
    font-size: 2.5rem;
    margin-bottom: 0.8rem;
    animation: emojiPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes emojiPop {
    from { transform: scale(0) rotate(-20deg); }
    to { transform: scale(1) rotate(0deg); }
  }

  /* Color variants — jade base, tinted borders */
  .type-good { border-color: #4ecdc4; box-shadow: 0 0 40px rgba(78,205,196,0.2), 0 8px 32px rgba(0,0,0,0.6); }
  .type-good .result-type { color: #4ecdc4; }
  .type-good .result-text { color: #e8fff9; }

  .type-bad { border-color: #ff6b9d; box-shadow: 0 0 40px rgba(255,107,157,0.2), 0 8px 32px rgba(0,0,0,0.6); }
  .type-bad .result-type { color: #ff9ec0; }
  .type-bad .result-text { color: #fff0f5; }

  .type-neutral { border-color: #9b7fd4; box-shadow: 0 0 40px rgba(155,127,212,0.2), 0 8px 32px rgba(0,0,0,0.6); }
  .type-neutral .result-type { color: #c3a6ff; }
  .type-neutral .result-text { color: #f5f0ff; }

  .type-legendary {
    border-color: #ffd700;
    background: #1e3a20;
    box-shadow: 0 0 80px rgba(255,215,0,0.25), 0 8px 32px rgba(0,0,0,0.6);
  }
  .type-legendary .result-type { color: #ffd700; }
  .type-legendary .result-text { color: #fffbe6; }

  /* Legendary explosion */
  .legendary-particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    border-radius: 8px;
  }
  .particle {
    position: absolute;
    font-size: 1rem;
    animation: particleFly 1.5s ease-out forwards;
    opacity: 0;
  }
  @keyframes particleFly {
    0% { transform: translate(0,0) scale(0); opacity: 1; }
    100% { transform: translate(var(--px), var(--py)) scale(1.5); opacity: 0; }
  }

  /* Cast count */
  .cast-count {
    margin-top: 1.5rem;
    font-size: 0.8rem;
    color: rgba(195, 166, 255, 0.3);
    letter-spacing: 0.15em;
    font-style: italic;
  }

  /* Mobile adjustments */
  @media (max-width: 480px) {
    h1 { font-size: 1.1rem; }
    .subtitle { margin-bottom: 2rem; font-size: 0.85rem; }
    .btn-inner { padding: 1rem 2rem; font-size: 0.9rem; }
    .result-card { padding: 1.5rem 1.2rem; min-height: 130px; }
    .result-text { font-size: 1rem; }
    .result-emoji { font-size: 2rem; }
    .container { padding: 1.5rem 1rem; }
  }

  /* Ripple effect on button press */
  .ripple {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    animation: rippleAnim 0.6s linear;
    background-color: rgba(195, 166, 255, 0.25);
    pointer-events: none;
  }
  @keyframes rippleAnim {
    to { transform: scale(4); opacity: 0; }
  }
</style>

castBtn.addEventListener('click', castSpell);
castBtn.addEventListener('touchend', function(e) {
  e.preventDefault();
  castSpell(e);
}, { passive: false });

function castSpell(e) {

  ripple.style.width = ripple.style.height = Math.max(rect.width, rect.height) * 2 + 'px';
  ripple.style.left = clientX - rect.left - parseFloat(ripple.style.width)/2 + 'px';
  ripple.style.top = clientY - rect.top - parseFloat(ripple.style.height)/2 + 'px';
  btn.appendChild(ripple);

  const card = document.getElementById('resultCard');
  const emojiEl = document.getElementById('resultEmoji');
  const typeEl = document.getElementById('resultType');
  const textEl = document.getElementById('resultText');
  const countEl = document.getElementById('castCount');
  const particles = document.getElementById('particles');

  // Reset
  card.classList.remove('show');
  card.className = 'result-card';

  setTimeout(() => {
    emojiEl.textContent = spell.emoji;
    textEl.textContent = spell.text;

    const typeLabels = {
      good: '✦ A BOON ✦',
      bad: '✦ A CURSE ✦',
      neutral: '✦ THE WHEEL TURNS ✦',
      legendary: '✦ ✦ ✦  THE ONE  ✦ ✦ ✦'
    };
    typeEl.textContent = typeLabels[type];

    card.classList.add('type-' + type);
    card.classList.add('show');

    // Legendary particles
    particles.innerHTML = '';
    if (type === 'legendary') {
      const symbols = ['✦','★','✧','⋆','☆','✨','💫','⭐','🌟'];
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        p.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--px:${(Math.random()-0.5)*200}px;--py:${(Math.random()-0.5)*200}px;animation-delay:${Math.random()*0.3}s`;
        particles.appendChild(p);
      }
    }

    const countWords = ['once', 'twice', 'thrice', 'four times', 'five times', 'six times',
      'seven times', 'eight times', 'nine times', 'ten times'];
    countEl.textContent = castCount <= 10 
      ? `You have cast the spell ${countWords[castCount-1]}.`
      : `You have cast the spell ${castCount} times. The arcane toll accumulates.`;

  }, 200);
}

// Generate stars
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  star.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;top:${Math.random()*100}%;
    --dur:${2+Math.random()*4}s;--delay:-${Math.random()*4}s;
    --min-op:${0.1+Math.random()*0.3};
  `;
  starsContainer.appendChild(star);
}

// Generate runes
const runesContainer = document.getElementById('runes');
const runeChars = ['᛭','ᚾ','ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ','ᚺ','ᚾ','ᛁ','ᛃ','ᛇ','ᛈ','ᛉ','ᛊ','ᛏ','ᛒ','ᛖ','ᛗ','ᛚ','ᛜ','ᛞ','ᛟ','✦','⋆','☽','☾'];
for (let i = 0; i < 25; i++) {
  const rune = document.createElement('div');
  rune.className = 'rune';
  rune.textContent = runeChars[Math.floor(Math.random()*runeChars.length)];
  rune.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--rdur:${6+Math.random()*8}s;--rdelay:-${Math.random()*8}s`;
  runesContainer.appendChild(rune);
}
</script>
</body>
</html>
